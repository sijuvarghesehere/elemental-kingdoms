<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Elemental Kingdoms</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>


  <!-- HERO SELECT -->

  <div class="hero-select active" id="heroSelect">

    <div class="hero-box">

      <h1>Select Your Hero</h1>

      <div class="hero-grid">

        <button onclick="selectHero('Arc Guardian')">

          <img src="arc-guardian.png">

          <span>Arc Guardian</span>

        </button>

        <button onclick="selectHero('Ember Sentinel')">

          <img src="ember-sentinel.png">

          <span>Ember Sentinel</span>

        </button>

        <button onclick="selectHero('Nexus Wraith')">

          <span>Nexus Wraith</span>

        </button>

        <button onclick="selectHero('Frost Monarch')">

          <span>Frost Monarch</span>

        </button>

      </div>

    </div>

  </div>



  <!-- TOP HEADER -->

  <header class="battle-header">

    <div class="player-side">

      <img
        src="arc-guardian.png"
        id="playerHero"
      >

      <div>

        <h2>SIJU</h2>

        <p id="selectedHero">
          Arc Guardian
        </p>

      </div>

    </div>


    <div class="middle-turn">

      <p>YOUR TURN</p>

      <h1 id="timer">
        00:18
      </h1>

    </div>


    <div class="enemy-side">

      <img
        src="ember-sentinel.png"
      >

      <div>

        <h2>SHADOWX</h2>

        <p>Nexus Wraith</p>

      </div>

    </div>

  </header>



  <!-- ENERGY -->

  <div class="energy-wrapper">

    <div class="energy-bar">

      <div
        class="energy-fill"
        id="energyFill"
      ></div>

    </div>

    <span id="energyText">
      5/10
    </span>

  </div>



  <!-- GAME -->

  <main class="game-layout">


    <!-- BOARD -->

    <section class="board-area">

      <div class="board-frame">

        <div class="board" id="board">

          <div class="tile" data-index="0"></div>
          <div class="tile" data-index="1"></div>
          <div class="tile" data-index="2"></div>

          <div class="tile" data-index="3"></div>
          <div class="tile" data-index="4"></div>
          <div class="tile" data-index="5"></div>

          <div class="tile" data-index="6"></div>
          <div class="tile" data-index="7"></div>
          <div class="tile" data-index="8"></div>

        </div>

      </div>


      <!-- ABILITIES -->

      <div class="abilities">

        <button onclick="activateAbility('shield')">

          <img src="shield-icon.png">

          <span>Shield</span>

          <small>2</small>

        </button>


        <button onclick="activateAbility('fire')">

          <img src="fire-icon.png">

          <span>Fire</span>

          <small>2</small>

        </button>


        <button onclick="activateAbility('corrupt')">

          <img src="corrupt-icon.png">

          <span>Corrupt</span>

          <small>3</small>

        </button>


        <button onclick="activateAbility('freeze')">

          <img src="freeze-icon.png">

          <span>Freeze</span>

          <small>2</small>

        </button>


        <button onclick="activateAbility('teleport')">

          <img src="teleport-icon.png">

          <span>Teleport</span>

          <small>3</small>

        </button>

      </div>


      <!-- HERO CARD -->

      <div class="hero-card">

        <img
          src="arc-guardian.png"
          id="heroPortrait"
        >

        <div class="hero-info">

          <h2 id="heroName">
            ARC GUARDIAN
          </h2>

          <p class="rarity">
            EPIC
          </p>

          <h3 id="abilityTitle">
            Divine Shield
          </h3>

          <p id="abilityDescription">

            Protect one tile from enemy abilities.

          </p>

        </div>

      </div>


      <!-- PLAY BUTTON -->

      <button
        class="play-button"
        onclick="resetGame()"
      >

        PLAY AGAIN

      </button>

    </section>

  </main>



  <!-- POPUP -->

  <div class="popup" id="popup">

    <div class="popup-content">

      <h1 id="popupText">

        PLAYER X WINS

      </h1>

      <button onclick="resetGame()">

        PLAY AGAIN

      </button>

    </div>

  </div>


  <script src="game.js"></script>

</body>
</html>
